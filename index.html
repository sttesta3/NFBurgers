<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NF Burgers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=HK+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HERO / BRAND HEADER -->
  <header class="hero">
    <div class="hero-inner">
      <img src="Logo_blanco_fondo_transparente.png" class="logo-img" alt="NF Burgers">
      <div class="hero-text">
        <h1 class="brand-name">NF Burgers</h1>
        <p class="brand-tagline">Especialistas en Smash Burgers</p>
        <div class="brand-meta">
          <button id="status-badge" class="badge badge-status">
            <span id="status-dot" class="status-dot"></span>
            <span id="status-text">—</span>
          </button>
          <span class="badge">📍 Munro</span>
        </div>
      </div>
    </div>
  </header>

  <!-- MENU -->
  <div class="container">
    <p class="menu-label">— Menú</p>
    <main id="menu"></main>
  </div>

  <!-- SIZE SELECTOR SHEET -->
  <div id="size-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 id="sheet-burger-name">—</h2>
      <p id="sheet-burger-desc">—</p>
    </div>
    <div class="sheet-options" id="sheet-options"></div>
    <div class="sheet-options sheet-options-tight">
      <div class="form-group">
        <label class="form-label" for="burger-notes-input">Aclaraciones (opcional)</label>
        <textarea id="burger-notes-input" class="form-input form-textarea" placeholder="Sin sal, sin tomate, bien cocida, etc."></textarea>
      </div>
    </div>
    <div class="sheet-footer">
      <button id="add-with-size" disabled>Elegí un tamaño</button>
    </div>
  </div>

  <!-- NOTES SHEET (para adicionales, ej. papas fritas) -->
  <div id="notes-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 id="notes-item-name">—</h2>
      <p id="notes-item-price">—</p>
    </div>
    <div class="sheet-options">
      <div class="form-group">
        <label class="form-label" for="item-notes-input">Aclaraciones (opcional)</label>
        <textarea id="item-notes-input" class="form-input form-textarea" placeholder="Sin sal, bien crocantes, etc."></textarea>
      </div>
    </div>
    <div class="sheet-footer">
      <button id="add-with-notes">Agregar</button>
    </div>
  </div>

  <!-- SCHEDULE SHEET -->
  <div id="schedule-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2>Horarios</h2>
      <p id="schedule-current-status">—</p>
    </div>
    <div class="sheet-options" id="schedule-list"></div>
    <div class="sheet-footer">
      <button id="close-schedule" class="ghost-btn">Cerrar</button>
    </div>
  </div>

  <!-- CHECKOUT SHEET (pago / entrega / dirección) -->
  <div id="checkout-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2>Antes de enviar</h2>
      <p>Completá estos datos para tu pedido</p>
    </div>
    <div class="sheet-options">

      <div class="form-group">
        <label class="form-label" for="customer-name-input">Tu nombre</label>
        <input type="text" id="customer-name-input" class="form-input" placeholder="¿A nombre de quién?">
      </div>

      <div class="form-group">
        <label class="form-label">Método de pago</label>
        <div class="pill-group" id="payment-group">
          <button type="button" class="pill" data-value="Efectivo">💵 Efectivo</button>
          <button type="button" class="pill" data-value="MercadoPago">📲 MercadoPago</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Entrega</label>
        <div class="pill-group" id="delivery-group">
          <button type="button" class="pill" data-value="Takeaway">🏠 Takeaway</button>
          <button type="button" class="pill" data-value="Delivery">🛵 Delivery</button>
        </div>
      </div>

      <div class="form-group" id="address-group" style="display:none;">
        <label class="form-label" for="address-input">Dirección de entrega</label>
        <input type="text" id="address-input" class="form-input" placeholder="Calle, número, piso/depto, entre calles...">
      </div>

      <p id="checkout-error" class="checkout-error" style="display:none;"></p>
    </div>
    <div class="sheet-footer">
      <button id="confirm-checkout">Confirmar y enviar</button>
    </div>
  </div>

  <!-- CART SIDEBAR -->
  <aside id="cart-modal">
    <div class="cart-header">
      <h2>Tu pedido</h2>
      <button id="close-cart" aria-label="Cerrar carrito">×</button>
    </div>

    <div id="cart-items">
      <p class="cart-empty">Todavía no agregaste nada.</p>
    </div>

    <div class="cart-footer">
      <div class="total-row">
        <span>Total</span>
        <span class="total-amount">$<span id="cart-total">0</span></span>
      </div>
      <button id="send-order">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M11.99 2C6.47 2 2 6.47 2 11.99c0 1.76.47 3.41 1.29 4.84L2 22l5.31-1.27A9.945 9.945 0 0011.99 22C17.51 22 22 17.52 22 11.99 22 6.48 17.51 2 11.99 2zm0 17.9c-1.53 0-2.96-.41-4.19-1.12l-.3-.18-3.12.75.77-3.05-.2-.32A7.888 7.888 0 014.1 11.99c0-4.35 3.55-7.9 7.89-7.9 4.35 0 7.9 3.55 7.9 7.9 0 4.35-3.55 7.91-7.9 7.91z"/></svg>
        Enviar por WhatsApp
      </button>
    </div>
  </aside>

  <!-- CART FLOATING BUTTON -->
  <button id="cart-icon" aria-label="Ver carrito">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="21" r="1"></circle>
      <circle cx="20" cy="21" r="1"></circle>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
    </svg>
    <span id="cart-count" class="hidden">0</span>
  </button>

  <!-- OVERLAY -->
  <div id="overlay"></div>

  <script src="app.js"></script>
</body>
</html>
